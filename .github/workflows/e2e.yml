name: E2E Tests (Vercel Preview)

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Wait for Vercel Preview Deployment ──────────────────────
      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15

      # ── 2. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Setup Node.js ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 4. Install dependencies ────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Cache Playwright browsers ──────────────────────────────
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      # ── 6. Run E2E tests against Vercel Preview URL ───────────────
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel.outputs.url }}
          E2E_TRAINER_EMAIL: ${{ secrets.E2E_TRAINER_EMAIL }}
          E2E_TRAINER_PASSWORD: ${{ secrets.E2E_TRAINER_PASSWORD }}
          E2E_ATHLETE_EMAIL: ${{ secrets.E2E_ATHLETE_EMAIL }}
          E2E_ATHLETE_PASSWORD: ${{ secrets.E2E_ATHLETE_PASSWORD }}

      # ── 7. Upload failure artifacts ────────────────────────────────
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
